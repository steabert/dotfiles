"comment" = { modifiers = ["dim"] }
"function" = { modifiers = ["bold"] }
"keyword" = { fg = "base0A" }
"module" = { fg = "base0D" }
"namespace" = { fg = "base0D" }
"type" = { fg = "base0D" }

"ui.background" = { bg = "base00" }
"ui.background.separator" = { fg = "base06" }

"ui.linenr" = { fg = "base04" }
"ui.linenr.selected" = { fg = "base0A" }

"ui.statusline" = { fg = "base0A", bg = "base01" }
"ui.statusline.inactive" = { fg = "base06", bg = "base01", modifiers = ["dim"] }
"ui.statusline.normal" = { fg = "base00", bg = "base0B", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "base00", bg = "base0A", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "base00", bg = "base0C", modifiers = ["bold"] }

"ui.popup" = { bg = "base01" }
"ui.window" = { fg = "base02" }
"ui.help" = { bg = "base01", fg = "base06" }

"ui.text" = { fg = "base06" }
"ui.text.focus" = { fg = "base06" }

"ui.virtual" = { fg = "base02" }
"ui.virtual.ruler" = {bg="base02"}
"ui.virtual.indent-guide" = { fg = "base02" }
"ui.virtual.inlay-hint" = { fg = "base03" }
"ui.virtual.jump-label" = { fg = "base0C" }

"ui.selection" = { bg = "base03" }
"ui.selection.primary" = { bg = "base03" }

"ui.cursor" = { fg = "base00" , bg = "base0A" }
"ui.cursorline.primary" = { bg = "base01" }

"ui.highlight" = { bg = "base02" }

"ui.menu" = { fg = "base06", bg = "base01" }
"ui.menu.selected" = { fg = "base06", bg = "base03" }
"ui.menu.scroll" = { fg = "base04", bg = "base01" }

"diagnostic.error" = { underline = { color = "base08", style = "curl" } }
"diagnostic.hint" = { underline = { color = "base0B", style = "curl" } }
"diagnostic.info" = { underline = { color = "base04", style = "curl" } }
"diagnostic.warning" = { underline = { color = "base0D", style = "curl" } }

error = "base08"
hint = "base0B"
info = "base04"
warning = "base09"

[palette]
base00 = "#fbfbfb"
base01 = "#f0f0f0"
base02 = "#e9e9e9"
base03 = "#d0d0d0"
base04 = "#3e3e3e"
base05 = "#2a2a2d"
base06 = "#1b1b1b"
base07 = "#101010"
base08 = "#9a0e2a" # red
base09 = "#ffa500" # orange
base0A = "#000099" # blue
base0B = "#009966" # green
base0C = "#990099" # magenta
base0D = "#7c3f00" # brown
base0E = "#000000"
base0F = "#ffffff"
